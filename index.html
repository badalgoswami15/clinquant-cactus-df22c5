<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="converter-box">
        <h2>Smart Converter</h2>
        <p>Choose Conversion:</p>
        <select id="conversionType">
            <option value="kmToMeter">Kilometer to Meter</option>
            <option value="usdToInr">USD to INR</option>
        </select>
        <input type="number" id="inputValue" placeholder="Enter value...">
        <button id="convertBtn">Convert Now</button>
        <div id="resultDisplay" class="result"></div>
    </div>
    <script src="model.js"></script>
    <script src="controller.js"></script>
</body>
</html>
