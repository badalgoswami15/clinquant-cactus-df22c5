<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Unit & Currency Converter</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .converter-box {
            background-color: #262626;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
            width: 350px;
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
            color: #ff4d4d;
        }
        select, input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #333;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: #ff4d4d;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #e04343;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #2ecc71;
        }
    </style>
</head>
<body>

<div class="converter-box">
    <h2>Smart Converter</h2>
    
    <label>Choose Conversion:</label>
    <select id="conversionType">
        <option value="usdToInr">USD to INR (Dollar to Rupee)</option>
        <option value="inrToUsd">INR to USD (Rupee to Dollar)</option>
        <option value="kmToMeter">Kilometer to Meter</option>
        <option value="meterToKm">Meter to Kilometer</option>
    </select>

    <input type="number" id="inputValue" placeholder="Enter Value Here" required>

    <button onclick="convert()">Convert Now</button>

    <div class="result" id="resultDisplay">Result will appear here</div>
</div>

<script src="./script.js"></script>
</body>
</html>
